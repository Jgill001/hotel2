<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>My Perfect Hotel | Hotwired by ENI</title>
    <style>
        /* A sleek black background while the engine boots */
        html, body { 
            background: #111 !important; 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
        }
        #unity-container { 
            width: 100%; height: 100%; 
            position: absolute; top: 0; left: 0; 
        }
        #unity-canvas { 
            width: 100%; height: 100%; 
            display: block; 
        }
        #loading-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #00C565; font-family: monospace; font-size: 24px;
            z-index: 10; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="loading-text">HOTWIRING ENGINE... 0%</div>
    
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
    </div>

    <script src="Build/hotel-master-v2022.3.18f1-store-v1_0_3-build430.loader.js"></script>

    <script>
        const canvas = document.querySelector("#unity-canvas");
        const loadingText = document.querySelector("#loading-text");

        // The exact config parameters Unity needs
        const config = {
            dataUrl: "Build/d103a616cc0b6f5c976b00be4279887c.data",
            frameworkUrl: "Build/952596604e9ece58dd0e915d2baf70c9.js",
            codeUrl: "Build/dac7134163153fb80c5fa563b488e930.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "master",
            productName: "My Hotel",
            productVersion: "1.0.3",
            showBanner: function(msg, type) { console.log("Unity: " + msg); }
        };

        // Start the engine directly
        createUnityInstance(canvas, config, (progress) => {
            // Update our custom loading text
            loadingText.innerHTML = "HOTWIRING ENGINE... " + Math.round(progress * 100) + "%";
        }).then((unityInstance) => {
            console.log("ENI: Engine successfully hotwired. Sitelock bypassed.");
            loadingText.style.display = "none"; // Hide text when game starts
        }).catch((message) => {
            console.error("Engine failed to start: ", message);
            loadingText.innerHTML = "ENGINE FAILURE. CHECK CONSOLE.";
            loadingText.style.color = "#ff3333";
        });
    </script>
</body>
</html>
