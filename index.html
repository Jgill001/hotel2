<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <title>My Perfect Hotel</title>
    <style>
      body { padding: 0; margin: 0; background-color: #000; overflow: hidden; width: 100vw; height: 100dvh; position: fixed; }
      #unity-canvas { width: 100vw; height: 50vh; background: #222; display: block; }
      #eni-console {
        position: absolute; bottom: 0; left: 0; width: 100vw; height: 50vh;
        background: rgba(0, 0, 0, 0.95); color: #fff; font-family: monospace; font-size: 11px;
        overflow-y: auto; padding: 10px; box-sizing: border-box; border-top: 3px solid #ff3333; z-index: 9999; word-wrap: break-word;
      }
      .log-error { color: #ff3333; font-weight: bold; }
      .log-warn { color: #ffcc00; }
      .log-info { color: #aaa; }
    </style>

    <script>
      // Asset Redirector
      const originalFetch = window.fetch;
      window.fetch = async function(input, init) {
          let url = typeof input === 'string' ? input : (input.url ? input.url : input);
          if (url.includes('StreamingAssets')) {
              const parts = url.split('StreamingAssets');
              url = "./StreamingAssets" + parts[parts.length - 1];
          }
          return originalFetch(url, init);
      };

      // Basic Poki Stubs so it doesn't crash from missing SDK
      window.PokiSDK = {
          init: () => Promise.resolve(),
          gameLoadingStart: () => {}, gameLoadingFinished: () => {},
          gameplayStart: () => {}, gameplayStop: () => {},
          commercialBreak: () => Promise.resolve(false), rewardedBreak: () => Promise.resolve(true)
      };
      window.initPokiBridge = () => window.PokiSDK;
    </script>
  </head>
  <body>

    <canvas id="unity-canvas"></canvas>
    <div id="eni-console"><div>[ENI Hotel 2 Logger] Engine booting...</div></div>

    <script>
      // THE LOG CATCHER
      const eniConsole = document.getElementById('eni-console');
      function printLog(msg, cssClass) {
          const div = document.createElement('div'); div.className = cssClass;
          div.innerText = "> " + msg; eniConsole.appendChild(div); eniConsole.scrollTop = eniConsole.scrollHeight;
      }

      const origLog = console.log; const origWarn = console.warn; const origError = console.error;
      console.log = function(...args) { origLog(...args); printLog(args.join(' '), 'log-info'); };
      console.warn = function(...args) { origWarn(...args); printLog(args.join(' '), 'log-warn'); };
      console.error = function(...args) { origError(...args); printLog(args.join(' '), 'log-error'); };
      window.onerror = function(msg) { printLog(`JS CRASH: ${msg}`, 'log-error'); };

      // BOOT HOTEL 2
      const script = document.createElement("script");
      script.src = "Build/hotel-master-v2022.3.18f1-store-v1_0_3-build430.loader.js";
      script.onload = () => {
        createUnityInstance(document.querySelector("#unity-canvas"), {
          dataUrl: "Build/d103a616cc0b6f5c976b00be4279887c.data",
          frameworkUrl: "Build/952596604e9ece58dd0e915d2baf70c9.js",
          codeUrl: "Build/dac7134163153fb80c5fa563b488e930.wasm",
          streamingAssetsUrl: "StreamingAssets",
          companyName: "master",
          productName: "My Hotel",
          productVersion: "1.0.3"
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
