<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>My Perfect Hotel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html, body { 
            background: #00C565 !important; 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
        }
        #unity-container { 
            width: 100%; height: 100%; 
            position: absolute; top: 0; left: 0; 
        }
        #unity-canvas { 
            width: 100%; height: 100%; display: block; 
        }
        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #00C565; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }
        #loading-text {
            color: white; font-family: sans-serif; font-size: 24px;
            font-weight: bold; margin-bottom: 20px; text-transform: uppercase;
        }
        #progress-bar-container {
            width: 60%; max-width: 300px; height: 10px; background: rgba(0,0,0,0.2);
            border-radius: 5px; overflow: hidden;
        }
        #progress-bar {
            width: 0%; height: 100%; background: white; transition: width 0.1s;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div id="loading-text">Checking in...</div>
        <div id="progress-bar-container">
            <div id="progress-bar"></div>
        </div>
    </div>
    
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
    </div>

    <script>
        // --- 1. THE INVISIBLE SHIELD (Pacifies the game's anti-piracy checks) ---
        window.initPokiBridge = function() { console.log("PokiBridge stubbed."); };
        window.PokiSDK = {
            init: () => Promise.resolve(),
            gameLoadingStart: () => {}, gameLoadingFinished: () => {},
            gameplayStart: () => {}, gameplayStop: () => {},
            commercialBreak: () => Promise.resolve(),
            rewardedBreak: () => Promise.resolve(true),
            displayAd: () => Promise.resolve()
        };

        // --- 2. UNITY CONFIG ---
        const canvas = document.querySelector("#unity-canvas");
        const loadingOverlay = document.querySelector("#loading-overlay");
        const progressBar = document.querySelector("#progress-bar");

        const config = {
            dataUrl: "Build/d103a616cc0b6f5c976b00be4279887c.data",
            frameworkUrl: "Build/952596604e9ece58dd0e915d2baf70c9.js",
            codeUrl: "Build/dac7134163153fb80c5fa563b488e930.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "master",
            productName: "My Hotel",
            productVersion: "1.0.3",
            showBanner: (msg, type) => { console.log(msg); }
        };
    </script>

    <script src="Build/hotel-master-v2022.3.18f1-store-v1_0_3-build430.loader.js"></script>

    <script>
        // 4. Boot the Game
        createUnityInstance(canvas, config, (progress) => {
            progressBar.style.width = (progress * 100) + "%";
        }).then((unityInstance) => {
            console.log("Game successfully loaded.");
            loadingOverlay.style.display = "none";
        }).catch((message) => {
            console.error("Boot error:", message);
            document.getElementById("loading-text").innerText = "Error loading game";
        });
    </script>
</body>
</html>
