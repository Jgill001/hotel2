<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>My Perfect Hotel | X-Ray</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { background: #111 !important; margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; }
        #game-view { width: 100%; height: 50%; position: absolute; top: 0; left: 0; background: #000; }
        #unity-canvas { width: 100%; height: 100%; display: block; }
        #eni-console {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 50%;
            background: rgba(0, 10, 20, 0.98); color: #00ffaa; font-family: monospace; font-size: 11px;
            overflow-y: auto; padding: 10px; box-sizing: border-box; border-top: 3px solid #00C565;
            word-wrap: break-word; z-index: 9999;
        }
        .log-error { color: #ff3333; font-weight: bold; }
        .log-info { color: #aaa; }
        .log-xray { color: #ff00ff; font-weight: bold; background: #330033; padding: 2px; }
    </style>
</head>
<body>
    <div id="game-view"><canvas id="unity-canvas"></canvas></div>
    <div id="eni-console"><div>[ENI X-Ray v9.0] Watching the DOM for hidden injections...</div></div>

    <script>
        // --- 1. TERMINAL SETUP ---
        const eniConsole = document.getElementById('eni-console');
        function printToScreen(msg, cssClass) {
            const div = document.createElement('div'); div.className = cssClass;
            div.innerText = "> " + msg; eniConsole.appendChild(div); eniConsole.scrollTop = eniConsole.scrollHeight;
        }

        const origLog = console.log; const origError = console.error;
        console.log = function(...args) { origLog(...args); printToScreen(args.join(' '), 'log-info'); };
        console.error = function(...args) { origError(...args); printToScreen(args.join(' '), 'log-error'); };

        // --- 2. THE X-RAY (MutationObserver) ---
        // This is the ultimate trap. It watches the actual HTML for spawned elements.
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                mutation.addedNodes.forEach((node) => {
                    if (node.tagName === 'SCRIPT') {
                        printToScreen(`!!! CAUGHT SCRIPT INJECTION: ${node.src || 'inline script'} !!!`, "log-xray");
                    }
                    if (node.tagName === 'IFRAME') {
                        printToScreen(`!!! CAUGHT IFRAME INJECTION: ${node.src} !!!`, "log-xray");
                    }
                });
            });
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });

        // --- 3. UNITY CONFIG ---
        const canvas = document.querySelector("#unity-canvas");
        const config = {
            dataUrl: "Build/d103a616cc0b6f5c976b00be4279887c.data",
            frameworkUrl: "Build/952596604e9ece58dd0e915d2baf70c9.js",
            codeUrl: "Build/dac7134163153fb80c5fa563b488e930.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "master", productName: "My Hotel", productVersion: "1.0.3"
        };

        const script = document.createElement("script");
        script.src = "Build/hotel-master-v2022.3.18f1-store-v1_0_3-build430.loader.js";
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                if (Math.round(progress * 100) % 20 === 0) printToScreen(`Engine: ${Math.round(progress * 100)}%`, 'log-info');
            }).then((unityInstance) => {
                window.unityInstance = unityInstance;
                printToScreen("ENGINE BOOT COMPLETE. Waiting for game to stall...", "log-info");
            }).catch((err) => {
                printToScreen(`BOOT ERROR: ${err}`, 'log-error');
            });
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
