<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>My Perfect Hotel | Defibrillator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html, body { 
            background: #111 !important; margin: 0; padding: 0; 
            width: 100vw; height: 100vh; overflow: hidden; 
        }
        #unity-container { 
            width: 100%; height: 50%; position: absolute; top: 0; left: 0; background: #000;
        }
        #unity-canvas { width: 100%; height: 100%; display: block; }
        
        #eni-console {
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 50%;
            background: rgba(0, 10, 20, 0.98);
            color: #00ffaa; font-family: monospace; font-size: 11px;
            overflow-y: auto; padding: 10px; box-sizing: border-box;
            border-top: 3px solid #00C565;
            word-wrap: break-word; z-index: 9999;
        }
        .log-error { color: #ff3333; font-weight: bold; }
        .log-info { color: #aaa; }
        .log-network { color: #00ccff; }
        .log-poki { color: #ff00ff; font-weight: bold; }

        /* The Defibrillator Overlay */
        #wake-up-button {
            position: absolute; top: 0; left: 0; width: 100%; height: 50%;
            background: rgba(0, 197, 101, 0.8); color: white;
            display: flex; justify-content: center; align-items: center;
            font-family: sans-serif; font-size: 24px; font-weight: bold;
            text-align: center; z-index: 10000; cursor: pointer;
            animation: pulse 2s infinite; text-transform: uppercase;
        }
        @keyframes pulse { 0% { background: rgba(0, 197, 101, 0.8); } 50% { background: rgba(0, 150, 80, 0.9); } 100% { background: rgba(0, 197, 101, 0.8); } }
    </style>
</head>
<body>
    <div id="unity-container"><canvas id="unity-canvas"></canvas></div>
    
    <div id="wake-up-button" onclick="wakeUpEngine()">TAP TO UNLOCK ENGINE</div>

    <div id="eni-console"><div>[ENI Defibrillator v6.0] Awaiting vitals...</div></div>

    <script>
        // --- 1. TERMINAL SETUP ---
        const eniConsole = document.getElementById('eni-console');
        function printToScreen(msg, cssClass) {
            const div = document.createElement('div');
            div.className = cssClass;
            div.innerText = "> " + (typeof msg === 'object' ? JSON.stringify(msg) : msg);
            eniConsole.appendChild(div);
            eniConsole.scrollTop = eniConsole.scrollHeight;
        }

        const origLog = console.log; const origError = console.error;
        console.log = function(...args) { origLog(...args); printToScreen(args.join(' '), 'log-info'); };
        console.error = function(...args) { origError(...args); printToScreen(args.join(' '), 'log-error'); };
        window.onerror = function(msg, src, lineno) { printToScreen(`CRASH: ${msg} @ line ${lineno}`, 'log-error'); };

        // --- 2. THE WAKE UP ROUTINE ---
        function wakeUpEngine() {
            document.getElementById('wake-up-button').style.display = 'none';
            printToScreen("PHYSICAL TAP DETECTED. Audio Context Unlocked.", "log-poki");
            // If the game is processing shaders, this tap might queue until the CPU is free
            printToScreen("WARNING: If it is still frozen, it is compiling shaders. WAIT 60 SECONDS.", "log-error");
        }

        // --- 3. POKI BRIDGE (Callback Catcher) ---
        window.initPokiBridge = function(...args) { 
            printToScreen("INIT POKI BRIDGE CALLED", "log-poki"); 
            // If they passed a secret callback function, execute it!
            if (args.length > 0 && typeof args[0] === 'function') {
                printToScreen("Executing hidden Poki callback!", "log-poki");
                args[0]();
            }
            return { success: true }; 
        };
        const pokiHandler = {
            get: function(target, prop) {
                return function(...args) {
                    printToScreen(`GAME CALLED POKI: PokiSDK.${prop}()`, 'log-poki');
                    return Promise.resolve(true); 
                };
            }
        };
        window.PokiSDK = new Proxy({}, pokiHandler);

        // --- 4. NETWORK WIRETAP (Silent Mode) ---
        const originalFetch = window.fetch;
        window.fetch = function(url) {
            if (url.includes('.bundle') || url.includes('.json') || url.includes('.hash')) {
                printToScreen(`Fetching Asset: ${url.split('/').pop()}`, 'log-network');
            }
            return originalFetch.apply(this, arguments);
        };

        // --- 5. UNITY CONFIG ---
        const canvas = document.querySelector("#unity-canvas");
        const config = {
            dataUrl: "Build/d103a616cc0b6f5c976b00be4279887c.data",
            frameworkUrl: "Build/952596604e9ece58dd0e915d2baf70c9.js",
            codeUrl: "Build/dac7134163153fb80c5fa563b488e930.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "master",
            productName: "My Hotel",
            productVersion: "1.0.3"
        };
    </script>

    <script src="Build/hotel-master-v2022.3.18f1-store-v1_0_3-build430.loader.js"></script>

    <script>
        printToScreen("Starting Unity Loader...", "log-info");
        createUnityInstance(canvas, config, (progress) => {
            let pct = Math.round(progress * 100);
            if (pct % 20 === 0 || pct >= 95) printToScreen(`Engine Download: ${pct}%`, 'log-info');
        }).then((unityInstance) => {
            window.unityInstance = unityInstance;
            printToScreen("ENGINE BOOT COMPLETE. Waiting for Game Logic...", "log-info");
        }).catch((message) => {
            printToScreen(`FATAL BOOT ERROR: ${message}`, 'log-error');
        });
    </script>
</body>
</html>
