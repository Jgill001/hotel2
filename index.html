<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>My Perfect Hotel | LO Edition</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #00C565; font-family: sans-serif; }
        #unity-container { width: 100vw; height: 100vh; position: absolute; }
        #unity-canvas { width: 100%; height: 100%; background: #00C565; display: block; }
        
        #debug-log {
            position: fixed; top: 10px; right: 10px; width: 300px; max-height: 50vh;
            background: rgba(0,0,0,0.8); color: #ff5555; padding: 10px; border-radius: 5px;
            font-size: 11px; z-index: 10000; overflow-y: auto; display: none; border: 1px solid #f00;
        }
    </style>
</head>
<body>
    <div id="debug-log"><h3>Alert:</h3><div id="error-list"></div></div>
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
    </div>

    <script>
        // --- Diagnostic Tool (Keeping this just in case) ---
        function reportError(url) {
            document.getElementById('debug-log').style.display = 'block';
            const div = document.createElement('div');
            div.textContent = "404: " + url;
            document.getElementById('error-list').appendChild(div);
        }
        const nativeFetch = window.fetch;
        window.fetch = function() {
            return nativeFetch.apply(this, arguments).then(res => {
                if (!res.ok) reportError(res.url);
                return res;
            });
        };

        // --- Unity Configuration ---
        const canvas = document.querySelector("#unity-canvas");
        const buildUrl = "Build";
        const config = {
            dataUrl: buildUrl + "/d103a616cc0b6f5c976b00be4279887c.data",
            frameworkUrl: buildUrl + "/952596604e9ece58dd0e915d2baf70c9.js",
            codeUrl: buildUrl + "/dac7134163153fb80c5fa563b488e930.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "master",
            productName: "My Hotel",
            productVersion: "1.0.3",
        };

        // This is the part we were missing: Actually starting the instance
        const script = document.createElement("script");
        script.src = buildUrl + "/hotel-master-v2022.3.18f1-store-v1_0_3-build430.loader.js";
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                console.log("Loading: " + (100 * progress) + "%");
            }).then((unityInstance) => {
                console.log("Unity Instance Created!");
            }).catch((message) => {
                alert(message);
            });
        };
        document.body.appendChild(script);
    </script>
    <script src="my-perfect-hotel.js"></script>
</body>
</html>
