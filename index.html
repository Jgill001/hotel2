    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #00C565; font-family: sans-serif; }
        #unity-container { width: 100vw; height: 100vh; position: absolute; }
        #unity-canvas { width: 100%; height: 100%; background: #00C565; display: block; }
        #debug-log {
            position: fixed; top: 10px; right: 10px; width: 300px; max-height: 50vh;
            background: rgba(0,0,0,0.85); color: #ff5555; padding: 15px; border-radius: 8px;
            font-size: 11px; z-index: 10000; overflow-y: auto; display: none; border: 1px solid #f00;
        }
    </style>
    <script>
        // Diagnostic Snitch - Alerts us to any 404s
        function reportError(url) {
            document.getElementById('debug-log').style.display = 'block';
            const div = document.createElement('div');
            div.style.marginBottom = "5px";
            div.innerHTML = "<strong>Missing:</strong> " + url;
            document.getElementById('error-list').appendChild(div);
        }
        const nativeFetch = window.fetch;
        window.fetch = function() {
            return nativeFetch.apply(this, arguments).then(res => {
                if (!res.ok) reportError(res.url);
                return res;
            });
        };

        window.config = {
            loader: 'unity-2020',
            debug: false,
            maxRatio: 2.666,
            minRatio: 0.375,

                "development_player":"false",
