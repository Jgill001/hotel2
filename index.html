<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>My Perfect Hotel | Absolute Firewall</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { background: #111 !important; margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; touch-action: none; }
        #game-view { width: 100%; height: 50%; position: absolute; top: 0; left: 0; background: #000; }
        #unity-canvas { width: 100%; height: 100%; display: block; }
        #eni-console {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 50%;
            background: rgba(0, 10, 20, 0.98); color: #00ffaa; font-family: monospace; font-size: 11px;
            overflow-y: auto; padding: 10px; box-sizing: border-box; border-top: 3px solid #00C565;
            word-wrap: break-word; z-index: 9999;
        }
        .log-error { color: #ff3333; font-weight: bold; }
        .log-warn { color: #ffaa00; font-weight: bold; }
        .log-info { color: #aaa; }
        .log-network { color: #00ccff; }
    </style>
</head>
<body>
    <div id="game-view"><canvas id="unity-canvas"></canvas></div>
    <div id="eni-console"><div>[ENI Firewall v13.0] Unfiltered Interceptor Active...</div></div>

    <script>
        const eniConsole = document.getElementById('eni-console');
        function printToScreen(msg, cssClass) {
            const div = document.createElement('div'); div.className = cssClass;
            div.innerText = "> " + msg; eniConsole.appendChild(div); eniConsole.scrollTop = eniConsole.scrollHeight;
        }
        const origLog = console.log; const origError = console.error;
        console.log = function(...args) { origLog(...args); printToScreen(args.join(' '), 'log-info'); };
        console.error = function(...args) { origError(...args); printToScreen(args.join(' '), 'log-error'); };

        // --- 1. THE ABSOLUTE FIREWALL (Unfiltered Network Wiretap) ---
        const originalFetch = window.fetch;
        window.fetch = async function(...args) {
            const url = args[0];
            printToScreen(`Fetch Outbound: ${url}`, 'log-network');
            
            // Block anything that isn't from your github or local
            if (typeof url === 'string' && (url.includes('startgamer') || url.includes('poki') || url.includes('http://'))) {
                printToScreen(`[FIREWALL] Blocked & spoofed external tracking ping: ${url}`, 'log-warn');
                return new Response(JSON.stringify({status: "ok", success: true}), { status: 200, statusText: "OK" });
            }
            
            // The Antidote for GitHub 404s
            const response = await originalFetch.apply(this, args);
            if (!response.ok && typeof url === 'string' && (url.includes('.json') || url.includes('.hash'))) {
                printToScreen(`[ANTIDOTE] Blocked 404 Poison for: ${url.split('/').pop()}`, 'log-warn');
                return new Response("", { status: 404, statusText: "Not Found" });
            }
            return response;
        };

        const origOpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url) {
            this._targetUrl = url;
            printToScreen(`XHR Outbound: ${url}`, 'log-network');
            origOpen.apply(this, arguments);
        };
        
        const origSend = XMLHttpRequest.prototype.send;
        XMLHttpRequest.prototype.send = function() {
            // Intercept XHRs before they even leave the browser
            if (this._targetUrl.includes('startgamer') || this._targetUrl.includes('poki')) {
                printToScreen(`[FIREWALL] Blocked & spoofed external XHR: ${this._targetUrl}`, 'log-warn');
                try { Object.defineProperty(this, 'readyState', { value: 4 }); } catch(e){}
                try { Object.defineProperty(this, 'status', { value: 200 }); } catch(e){}
                try { Object.defineProperty(this, 'responseText', { value: '{"status":"ok"}' }); } catch(e){}
                if (this.onreadystatechange) this.onreadystatechange();
                if (this.onload) this.onload();
                return; // Kill the real request entirely
            }

            this.addEventListener('readystatechange', function() {
                if (this.readyState === 4 && this.status === 404 && (this._targetUrl.includes('.json') || this._targetUrl.includes('.hash'))) {
                    printToScreen(`[ANTIDOTE] Cleaned 404 for: ${this._targetUrl.split('/').pop()}`, 'log-warn');
                    try { Object.defineProperty(this, 'responseText', { value: '' }); Object.defineProperty(this, 'response', { value: '' }); } catch(e){}
                }
            });
            origSend.apply(this, arguments);
        };

        // --- 2. POKI STUBS ---
        window.PokiSDK = {
            init: () => Promise.resolve(),
            gameLoadingStart: () => {}, gameLoadingFinished: () => {},
            gameplayStart: () => {}, gameplayStop: () => {},
            commercialBreak: () => Promise.resolve(false), rewardedBreak: () => Promise.resolve(true), displayAd: () => Promise.resolve()
        };
        window.initPokiBridge = () => window.PokiSDK;

        // --- 3. UNITY BOOT ---
        const config = {
            dataUrl: "Build/d103a616cc0b6f5c976b00be4279887c.data",
            frameworkUrl: "Build/952596604e9ece58dd0e915d2baf70c9.js",
            codeUrl: "Build/dac7134163153fb80c5fa563b488e930.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "master", productName: "My Hotel", productVersion: "1.0.3"
        };

        const script = document.createElement("script");
        script.src = "Build/hotel-master-v2022.3.18f1-store-v1_0_3-build430.loader.js";
        script.onload = () => {
            printToScreen("Loader ready. Booting...", "log-info");
            createUnityInstance(document.querySelector("#unity-canvas"), config, (progress) => {}).then((unityInstance) => {
                window.unityInstance = unityInstance;
                printToScreen("ENGINE BOOT COMPLETE. Waiting for the freeze...", "log-info");
            }).catch((err) => printToScreen(`FATAL: ${err}`, 'log-error'));
        };
        document.head.appendChild(script);
    </script>
</body>
</html>
