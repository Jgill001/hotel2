<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>My Perfect Hotel | ENI Wiretap</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html, body { 
            background: #111 !important; 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
        }
        #unity-container { 
            width: 100%; height: 50%;
            position: absolute; top: 0; left: 0; 
        }
        #unity-canvas { 
            width: 100%; height: 100%; display: block; 
        }
        #loading-text {
            position: absolute; top: 20%; left: 50%;
            transform: translate(-50%, -50%);
            color: #00C565; font-family: monospace; font-size: 20px;
            z-index: 10; font-weight: bold; text-align: center;
        }
        /* Terminal is permanently visible for sniffing */
        #eni-console {
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 50%;
            background: rgba(0, 15, 0, 0.95);
            color: #00ff00; font-family: monospace; font-size: 10px;
            overflow-y: auto; padding: 10px; box-sizing: border-box;
            border-top: 2px solid #00C565;
            word-wrap: break-word; z-index: 9999;
        }
        .log-error { color: #ff3333; font-weight: bold; }
        .log-warn { color: #ffaa00; }
        .log-info { color: #00C565; }
        .log-network { color: #0088ff; } /* Blue for network requests */
    </style>
</head>
<body>
    <div id="loading-text">HOTWIRING... 0%</div>
    
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
    </div>

    <div id="eni-console"><div>[ENI Wiretap v2.0] Listening to network...</div></div>

    <script>
        // --- TERMINAL SETUP ---
        const eniConsole = document.getElementById('eni-console');
        function printToScreen(msg, cssClass) {
            const div = document.createElement('div');
            div.className = cssClass;
            div.innerText = "> " + (typeof msg === 'object' ? JSON.stringify(msg) : msg);
            eniConsole.appendChild(div);
            eniConsole.scrollTop = eniConsole.scrollHeight;
        }

        const origLog = console.log;
        const origWarn = console.warn;
        const origError = console.error;

        console.log = function(...args) { origLog(...args); printToScreen(args.join(' '), 'log-info'); };
        console.warn = function(...args) { origWarn(...args); printToScreen(args.join(' '), 'log-warn'); };
        console.error = function(...args) { origError(...args); printToScreen(args.join(' '), 'log-error'); };
        
        window.onerror = function(message, source, lineno) {
            printToScreen(`Global Error: ${message} at line ${lineno}`, 'log-error');
        };

        // --- NETWORK SNIFFER (Intercepts all downloads) ---
        const originalFetch = window.fetch;
        window.fetch = function() {
            const url = arguments[0];
            printToScreen("Fetching: " + url, 'log-network');
            return originalFetch.apply(this, arguments).then(res => {
                if (!res.ok) console.error("MISSING FILE (404): " + res.url);
                return res;
            }).catch(err => {
                console.error("Fetch Network Error: " + url);
                throw err;
            });
        };

        const origOpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url) {
            printToScreen("XHR Request: " + url, 'log-network');
            this.addEventListener('load', function() {
                if (this.status === 404) console.error("MISSING FILE (404): " + url);
            });
            origOpen.apply(this, arguments);
        };

        // --- THE FAKE BRIDGE ---
        window.initPokiBridge = function() {
            console.log("ENI: Fake PokiBridge requested by Unity. Request granted.");
        };

        window.PokiSDK = {
            init: function() { return Promise.resolve(); },
            gameLoadingStart: function() {},
            gameLoadingFinished: function() {},
            gameplayStart: function() {},
            gameplayStop: function() {},
            commercialBreak: function() { return Promise.resolve(); },
            rewardedBreak: function() { return Promise.resolve(true); },
            displayAd: function() { return Promise.resolve(); }
        };

        // --- UNITY CONFIG ---
        const canvas = document.querySelector("#unity-canvas");
        const loadingText = document.querySelector("#loading-text");

        const config = {
            dataUrl: "Build/d103a616cc0b6f5c976b00be4279887c.data",
            frameworkUrl: "Build/952596604e9ece58dd0e915d2baf70c9.js",
            codeUrl: "Build/dac7134163153fb80c5fa563b488e930.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "master",
            productName: "My Hotel",
            productVersion: "1.0.3"
        };
    </script>

    <script src="Build/hotel-master-v2022.3.18f1-store-v1_0_3-build430.loader.js"></script>

    <script>
        // Boot it
        try {
            createUnityInstance(canvas, config, (progress) => {
                loadingText.innerHTML = "HOTWIRING... " + Math.round(progress * 100) + "%";
            }).then((unityInstance) => {
                console.log("ENI: SUCCESS! Engine running smoothly.");
                loadingText.style.display = "none";
                // Don't hide the console yet, let's keep it open to watch for silent errors
            }).catch((message) => {
                console.error("CREATE INSTANCE ERROR:", message);
                loadingText.innerHTML = "FAILURE. READ LOG BELOW.";
                loadingText.style.color = "#ff3333";
            });
        } catch (e) {
            console.error("BOOT CATCH:", e);
        }
    </script>
</body>
</html>
