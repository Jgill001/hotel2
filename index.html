<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <title>My Perfect Hotel</title>
    <style>
      body { 
        padding: 0; 
        margin: 0; 
        background-color: #00C565; 
        overflow: hidden; 
        width: 100vw; 
        height: 100dvh; 
        position: fixed; 
      }
      #unity-canvas { 
        width: 100vw; 
        height: 100dvh; 
        background: #00C565; 
        display: block; 
        outline: none; 
      }
    </style>

    <script>
      // Asset Redirector - Essential for loading files from GitHub
      const originalFetch = window.fetch;
      window.fetch = async function(input, init) {
          let url = typeof input === 'string' ? input : (input.url ? input.url : input);
          if (url.includes('poki') || url.includes('StreamingAssets')) {
              const parts = url.split('StreamingAssets');
              url = "./StreamingAssets" + parts[parts.length - 1];
          }
          return originalFetch(url, init);
      };

      // Engine Bridge - Essential to prevent initialization errors
      window.initPokiBridge = () => true;

      window.PokiSDK = {
          init: () => Promise.resolve({adblocked: false}),
          commercialBreak: () => Promise.resolve(),
          rewardedBreak: () => new Promise(() => {}), // Silent wait if an ad is clicked
          gameplayStart: () => {}, 
          gameplayStop: () => {}
      };
      window.rewardedBreak = window.PokiSDK.rewardedBreak;
    </script>
  </head>
  <body>

    <canvas id="unity-canvas"></canvas>

    <script src="Build/ea153e321edf23b9a40b38d65ce41d01.loader.js"></script>
    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/101a0553a2917fd4c62a7e2159d30814.data",
        frameworkUrl: "Build/2809ee090e7f1bf0e1a32425590981e7.framework.js",
        codeUrl: "Build/9d94f3fbc22c5914756c67722e0cdaca.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "master",
        productName: "My Hotel",
        productVersion: "1.0.3"
      });
    </script>
  </body>
</html>
