<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>My Perfect Hotel | The Handshake</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html, body { 
            background: #00C565 !important; 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
        }
        #unity-container { 
            width: 100%; height: 100%; 
            position: absolute; top: 0; left: 0; 
        }
        #unity-canvas { 
            width: 100%; height: 100%; display: block; 
        }
        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #00C565; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }
        #loading-text {
            color: white; font-family: sans-serif; font-size: 20px;
            font-weight: bold; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div id="loading-text">HOTWIRING...</div>
    </div>
    
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
    </div>

    <script>
        // --- 1. THE ULTIMATE POKI PACIFIER ---
        // Some games use different bridge names, we will catch them all
        window.initPokiBridge = function() { return true; };
        
        // A Proxy object that automatically resolves ANY Poki function the game calls
        const pokiHandler = {
            get: function(target, prop) {
                return function() {
                    console.log("ENI: Game called PokiSDK." + prop + " - Auto-resolving.");
                    return Promise.resolve(true);
                };
            }
        };
        window.PokiSDK = new Proxy({}, pokiHandler);

        // --- 2. UNITY CONFIG ---
        const canvas = document.querySelector("#unity-canvas");
        const loadingOverlay = document.querySelector("#loading-overlay");
        const loadingText = document.querySelector("#loading-text");

        const config = {
            dataUrl: "Build/d103a616cc0b6f5c976b00be4279887c.data",
            frameworkUrl: "Build/952596604e9ece58dd0e915d2baf70c9.js",
            codeUrl: "Build/dac7134163153fb80c5fa563b488e930.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "master",
            productName: "My Hotel",
            productVersion: "1.0.3",
            showBanner: (msg, type) => { console.log("Unity Msg:", msg); }
        };
    </script>

    <script src="Build/hotel-master-v2022.3.18f1-store-v1_0_3-build430.loader.js"></script>

    <script>
        // 4. Boot the Game & COMPLETE THE HANDSHAKE
        createUnityInstance(canvas, config, (progress) => {
            loadingText.innerText = "ENGINE BOOTING: " + Math.round(progress * 100) + "%";
        }).then((unityInstance) => {
            // THE MISSING LINK: The game NEEDS this global variable to talk back to the browser!
            window.unityInstance = unityInstance;
            window.myGameInstance = unityInstance; // Adding a fallback name just in case
            
            console.log("ENI: Handshake complete. Global instance bound.");
            loadingOverlay.style.display = "none";
        }).catch((message) => {
            console.error("Boot error:", message);
            loadingText.innerText = "HOTWIRE FAILED.";
        });
    </script>
</body>
</html>
