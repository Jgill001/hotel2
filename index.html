<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>My Perfect Hotel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { 
            background: #00C565 !important; margin: 0; padding: 0; 
            width: 100vw; height: 100vh; overflow: hidden; 
        }
        #unity-canvas { width: 100%; height: 100%; display: block; }
        
        #loading-screen { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: #00C565; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 999; 
            color: white; font-family: sans-serif; 
        }
        #progress-bar { 
            width: 60%; max-width: 300px; height: 12px; background: rgba(0,0,0,0.2); 
            border-radius: 6px; margin-top: 20px; overflow: hidden; 
        }
        #progress-fill { 
            width: 0%; height: 100%; background: white; transition: width 0.2s; 
        }
        #play-btn { 
            display: none; margin-top: 25px; padding: 15px 40px; 
            background: white; color: #00C565; font-weight: 900; 
            border-radius: 30px; text-transform: uppercase; letter-spacing: 2px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); cursor: pointer;
        }
        #error-log {
            color: #ffcccc; font-family: monospace; font-size: 10px; 
            margin-top: 20px; text-align: center; max-width: 80%; word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <h1 style="margin:0; text-transform: uppercase; letter-spacing: 1px;">Checking In...</h1>
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div id="play-btn" onclick="startGame()">Tap To Play</div>
        <div id="error-log"></div>
    </div>
    
    <canvas id="unity-canvas"></canvas>

    <script>
        // 1. The Flawless Poki Crack
        window.PokiSDK = {
            init: () => Promise.resolve(),
            gameLoadingStart: () => {},
            gameLoadingFinished: () => {},
            gameplayStart: () => {},
            gameplayStop: () => {},
            commercialBreak: () => Promise.resolve(),
            rewardedBreak: () => Promise.resolve(true),
            displayAd: () => Promise.resolve()
        };
        // The game expects the bridge to return the SDK object itself
        window.initPokiBridge = () => window.PokiSDK;

        // 2. Unity Engine Config
        const config = {
            dataUrl: "Build/d103a616cc0b6f5c976b00be4279887c.data",
            frameworkUrl: "Build/952596604e9ece58dd0e915d2baf70c9.js",
            codeUrl: "Build/dac7134163153fb80c5fa563b488e930.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "master",
            productName: "My Hotel",
            productVersion: "1.0.3"
        };

        // 3. Bootloader
        const script = document.createElement("script");
        script.src = "Build/hotel-master-v2022.3.18f1-store-v1_0_3-build430.loader.js";
        script.onload = () => {
            createUnityInstance(document.querySelector("#unity-canvas"), config, (progress) => {
                document.getElementById("progress-fill").style.width = (progress * 100) + "%";
            }).then((unityInstance) => {
                window.unityInstance = unityInstance;
                // Engine is fully loaded, show the play button!
                document.getElementById("progress-bar").style.display = "none";
                document.getElementById("play-btn").style.display = "block";
            }).catch((err) => {
                document.getElementById("error-log").innerText = "Engine Error: " + err;
            });
        };
        document.body.appendChild(script);

        // 4. The Ignition Sequence (Audio Unlock + Brute Force Handshake)
        function startGame() {
            document.getElementById("loading-screen").style.display = "none";
            
            // If the game's internal 50% UI is still stuck, we kick the door down
            if (window.unityInstance) {
                try { window.unityInstance.SendMessage("PokiUnitySDK", "Ready"); } catch(e){}
                try { window.unityInstance.SendMessage("PokiUnitySDK", "OnPokiInit"); } catch(e){}
            }
        }
    </script>
</body>
</html>
