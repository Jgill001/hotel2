<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>My Perfect Hotel | God-Tier Sniffer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html, body { 
            background: #111 !important; 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
        }
        #unity-container { 
            width: 100%; height: 50%; /* Game on top */
            position: absolute; top: 0; left: 0; 
            background: #000;
        }
        #unity-canvas { width: 100%; height: 100%; display: block; }
        
        /* The Unstoppable Terminal */
        #eni-console {
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 50%;
            background: rgba(0, 10, 20, 0.98);
            color: #00ffaa; font-family: monospace; font-size: 11px;
            overflow-y: auto; padding: 10px; box-sizing: border-box;
            border-top: 3px solid #00C565;
            word-wrap: break-word; z-index: 9999;
        }
        .log-error { color: #ff3333; font-weight: bold; }
        .log-warn { color: #ffaa00; }
        .log-info { color: #aaa; }
        .log-network { color: #00ccff; }
        .log-poki { color: #ff00ff; font-weight: bold; } /* Magenta for Poki calls */
    </style>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
    </div>

    <div id="eni-console"><div>[ENI Sniffer v4.0] Booting Wiretaps...</div></div>

    <script>
        // --- 1. TERMINAL SETUP ---
        const eniConsole = document.getElementById('eni-console');
        function printToScreen(msg, cssClass) {
            const div = document.createElement('div');
            div.className = cssClass;
            div.innerText = "> " + (typeof msg === 'object' ? JSON.stringify(msg) : msg);
            eniConsole.appendChild(div);
            eniConsole.scrollTop = eniConsole.scrollHeight;
        }

        const origLog = console.log; const origWarn = console.warn; const origError = console.error;
        console.log = function(...args) { origLog(...args); printToScreen(args.join(' '), 'log-info'); };
        console.warn = function(...args) { origWarn(...args); printToScreen(args.join(' '), 'log-warn'); };
        console.error = function(...args) { origError(...args); printToScreen(args.join(' '), 'log-error'); };
        window.onerror = function(msg, src, lineno) { printToScreen(`CRASH: ${msg} @ line ${lineno}`, 'log-error'); };
        window.addEventListener('unhandledrejection', e => { printToScreen(`PROMISE FAIL: ${e.reason}`, 'log-error'); });

        // --- 2. NETWORK WIRETAP (XHR & Fetch) ---
        const originalFetch = window.fetch;
        window.fetch = function() {
            printToScreen(`Fetch: ${arguments[0]}`, 'log-network');
            return originalFetch.apply(this, arguments);
        };

        const origOpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url) {
            printToScreen(`XHR: ${url}`, 'log-network');
            this.addEventListener('error', () => printToScreen(`XHR FAILED: ${url}`, 'log-error'));
            this.addEventListener('load', () => {
                if (this.status >= 400) printToScreen(`XHR ${this.status} MISSING: ${url}`, 'log-error');
            });
            origOpen.apply(this, arguments);
        };

        // --- 3. POKI SDK TRACKING BEACON ---
        window.initPokiBridge = function() { printToScreen("INIT POKI BRIDGE CALLED", "log-poki"); return true; };
        
        const pokiHandler = {
            get: function(target, prop) {
                return function(...args) {
                    printToScreen(`GAME CALLED POKI: PokiSDK.${prop}()`, 'log-poki');
                    if (args.length > 0) printToScreen(`  with args: ${JSON.stringify(args)}`, 'log-poki');
                    return Promise.resolve(true); // Always say yes
                };
            }
        };
        window.PokiSDK = new Proxy({}, pokiHandler);

        // --- 4. UNITY CONFIG ---
        const canvas = document.querySelector("#unity-canvas");
        const config = {
            dataUrl: "Build/d103a616cc0b6f5c976b00be4279887c.data",
            frameworkUrl: "Build/952596604e9ece58dd0e915d2baf70c9.js",
            codeUrl: "Build/dac7134163153fb80c5fa563b488e930.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "master",
            productName: "My Hotel",
            productVersion: "1.0.3"
        };
    </script>

    <script src="Build/hotel-master-v2022.3.18f1-store-v1_0_3-build430.loader.js"></script>

    <script>
        // Boot it
        printToScreen("Starting Unity Loader...", "log-info");
        createUnityInstance(canvas, config, (progress) => {
            let pct = Math.round(progress * 100);
            if (pct % 10 === 0 || pct >= 95) printToScreen(`Engine Download: ${pct}%`, 'log-info');
        }).then((unityInstance) => {
            window.unityInstance = unityInstance;
            printToScreen("ENGINE BOOT COMPLETE. Handing over to Game Logic...", "log-info");
        }).catch((message) => {
            printToScreen(`FATAL BOOT ERROR: ${message}`, 'log-error');
        });
    </script>
</body>
</html>
